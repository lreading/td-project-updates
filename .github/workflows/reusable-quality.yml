name: Reusable Quality

on:
  workflow_call:
    inputs:
      run-dependency-review:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node@v6.2.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npx playwright install --with-deps chromium
        working-directory: app
      - run: npm run validate:content
        working-directory: app
      - run: npm run verify
        working-directory: app
      - run: npm run coverage
        working-directory: app

  cli:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node@v6.2.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
        working-directory: cli
      - run: npm run verify
        working-directory: cli
      - run: npm run coverage
        working-directory: cli

  docs:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node@v6.2.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
        working-directory: docs
      - run: npm run build
        working-directory: docs

  markdown:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node@v6.2.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
      - run: npx -y markdownlint-cli2@0.22.0 "README.md" "CONTRIBUTING.md" "docs/**/*.md" "!docs/node_modules/**"

  spellcheck:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node@v6.2.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
      - run: npx -y cspell@9.7.0 lint --no-progress "README.md" "CONTRIBUTING.md" "docs/**/*.md" --gitignore --config .cspell.json

  links:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node@v6.2.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
        working-directory: docs
      - run: DOCS_SITE_URL=http://127.0.0.1:4174 npm run build
        working-directory: docs
      - run: npx -y http-server@14.1.1 ./docs/.vitepress/dist -p 4174 >/tmp/slide-spec-docs.log 2>&1 &
      - run: sleep 2
      # lycheeverse/lychee-action@v2.8.0
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: --verbose --no-progress --config .github/lychee.toml "./README.md"
          fail: true
      # lycheeverse/lychee-action@v2.8.0
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: --verbose --no-progress --config .github/lychee.toml --base-url "http://127.0.0.1:4174/" "./docs/.vitepress/dist/**/*.html"
          fail: true

  trivy:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            aquasec/trivy:0.67.2 \
            fs \
            --severity HIGH,CRITICAL \
            --scanners vuln,secret,misconfig \
            --format sarif \
            --output /repo/trivy-results.sarif \
            /repo
      # actions/upload-artifact@v7.0.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif

  semgrep:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: |
          docker run --rm \
            -v "${PWD}:/src" \
            semgrep/semgrep:1.124.0 \
            semgrep scan \
            --config auto \
            --error \
            --json \
            --output /src/semgrep-results.json \
            /src
      # actions/upload-artifact@v7.0.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            zricethezav/gitleaks:v8.28.0 \
            detect \
            --source /repo \
            --report-format sarif \
            --report-path /repo/gitleaks-results.sarif \
            --redact \
            --no-banner
      # actions/upload-artifact@v7.0.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: gitleaks-results
          path: gitleaks-results.sarif

  sbom:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # anchore/sbom-action@v0.24.0
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      # actions/upload-artifact@v7.0.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: sbom-spdx
          path: sbom.spdx.json

  dast:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node@v6.2.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: SLIDE_SPEC_DEPLOYMENT_URL=http://127.0.0.1:4173 SLIDE_SPEC_SITEMAP_ENABLED=true npm run build
        working-directory: app
      - run: npx -y http-server@14.1.1 ./dist -p 4173 >/tmp/slide-spec-app.log 2>&1 &
        working-directory: app
      - run: sleep 2
      - run: mkdir -p dast-report && chmod 777 dast-report
      - run: >
          docker run --rm --network host --user root
          -v "${PWD}/.github:/zap/config:ro"
          -v "${PWD}/dast-report:/zap/wrk:rw"
          ghcr.io/zaproxy/zaproxy:stable
          zap-baseline.py
          -t http://127.0.0.1:4173
          -c /zap/config/zap-baseline.conf
          -J zap-report.json
          -w zap-warnings.md
          -I
      # actions/upload-artifact@v7.0.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: dast-report
          path: |
            dast-report/zap-report.json
            dast-report/zap-warnings.md

  dependency-review:
    if: inputs.run-dependency-review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/dependency-review-action@v4.9.0
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
