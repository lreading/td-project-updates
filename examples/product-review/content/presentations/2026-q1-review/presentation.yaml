# Slide Spec
# https://www.slide-spec.dev/
# Documentation: https://docs.slide-spec.dev/
# yaml-language-server: $schema=https://slide-spec.dev/schema/presentation.schema.json
schemaVersion: 1
presentation:
  id: 2026-q1-review
  year: 2026
  title: Meridian Q1 2026 Review
  subtitle: Product Team
  slides:
    - template: hero
      enabled: true
      content:
        title_primary: Meridian
        title_accent: Q1 Review
        subtitle_prefix: Product Team
        quote: Ship outcomes, not features.
    - template: agenda
      enabled: true
      title: Agenda
      subtitle: What this review covers
    - template: section-list-grid
      enabled: true
      title: What we shipped
      subtitle: Key deliverables from Q1
      content:
        sections:
          - title: Workspace redesign
            bullets:
              - Customizable layouts with drag-and-drop panels
              - Saved views for different project phases
              - Mobile-responsive workspace on tablet and phone
          - title: API v3
            bullets:
              - RESTful endpoints with OpenAPI 3.1 spec
              - Breaking change migration CLI for partners
              - Rate limiting with dashboard visibility
          - title: Self-serve onboarding
            bullets:
              - Guided setup wizard for teams under 50
              - Template library with 12 pre-built project types
              - Automated welcome sequences for new members
    - template: timeline
      enabled: true
      title: Milestones
      subtitle: Key releases this quarter
      content:
        latest_badge_label: Latest
        footer_link_label: View all milestones
        featured_release_ids:
          - workspace-v2
          - api-v3
          - onboarding-launch
    - template: progress-timeline
      enabled: true
      title: "Roadmap: Shipped"
      subtitle: Q1 deliverables
      content:
        stage: completed
        deliverables_heading: Delivered
        focus_areas_heading: Strategic themes
        footer_link_label: View full roadmap
        stages:
          completed:
            label: Shipped
            summary: Delivered in Q1 2026.
          in-progress:
            label: In Progress
            summary: Carrying into Q2.
          planned:
            label: Planned
            summary: Scoped for Q2 2026.
          future:
            label: Future
            summary: Under exploration.
        items:
          - Workspace redesign with customizable layouts
          - API v3 with breaking change migration tool
          - Self-serve onboarding flow for teams under 50
        themes:
          - category: User Experience
            target: Reduce time-to-value for new workspace setups.
          - category: Platform
            target: Modernize the API for partner integrations.
    - template: people
      enabled: true
      title: Team spotlight
      subtitle: People who drove Q1 outcomes
      content:
        banner_prefix: Thanks to all
        contributors_link_label: team members
        banner_suffix: who shipped Q1 deliverables.
        spotlight:
          - login: priya-design
            summary: Led the workspace redesign from research through launch, including the mobile experience.
          - login: marcus-api
            summary: Architected API v3 and built the partner migration tool.
          - login: lin-growth
            summary: Designed and shipped the self-serve onboarding flow, reducing setup time by 60%.
    - template: metrics-and-links
      enabled: true
      title: Key metrics
      subtitle: Product health signals from Q1
      content:
        section_heading: Customer signals
        stats_heading: This quarter
        trend_suffix: vs Q4 2025
        show_deltas: true
        stat_keys:
          - stories_completed
          - epics_closed
          - customer_nps
          - bugs_resolved
        mentions:
          - type: Customer feedback
            title: Enterprise customers rated the workspace redesign 4.6/5 in the post-launch survey.
          - type: Analyst report
            title: Meridian named a Strong Performer in the 2026 project management wave.
            url_label: Read the report
            url: https://meridian.example.com/analyst-report
    - template: action-cards
      enabled: true
      title: Q2 priorities
      subtitle: Where we need help
      content:
        footer_text: Focus is our competitive advantage.
        cards:
          - title: Enterprise permissions
            description: Help define the permission model for multi-team organizations with compliance requirements.
            url_label: View the epic
            url: https://meridian.atlassian.net/browse/MER-2150
          - title: Real-time collab
            description: Test the collaboration prototype with your team and share feedback before wider rollout.
            url_label: Join the beta
            url: https://meridian.example.com/beta/collab
          - title: Integration partnerships
            description: If you have contacts at Jira, Linear, or Asana, connect us for two-way sync partnerships.
            url_label: Partner brief
            url: https://meridian.example.com/partners
    - template: closing
      enabled: true
      content:
        heading: Thank you
        message: Q1 was our strongest quarter yet. Let us keep the momentum into Q2.
        quote: Great products are built by great teams.
