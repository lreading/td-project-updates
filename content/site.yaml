# yaml-language-server: $schema=https://slide-spec.dev/schema/site.schema.json
schemaVersion: 1
site:
  title: Aurora Notes Quarterly Updates
  mascot:
    url: content/assets/aurora-notes-mascot.svg
    alt: Aurora Notes mascot
  data_sources:
    - type: github
      url: https://github.com/example-org/aurora-notes
  project_badge:
    label: Demo Lab Project
    fa_icon: fa-flask
    icon_position: before
  presentation_logo:
    url: content/assets/aurora-notes-logo.svg
    alt: Aurora Notes logo
  navigation:
    brand_title: Aurora Notes Updates
    home_label: Home
    presentations_label: Presentations
    latest_presentation_label: Latest Presentation
    toggle_label: Toggle navigation
  attribution:
    enabled: true
    label: Powered by slide-spec
    url: https://github.com/lreading/slide-spec
  presentation_chrome:
    mark_label: Aurora Notes
  presentation_toolbar:
    navigation_label: Slide navigation
    previous_slide_label: Previous slide
    next_slide_label: Next slide
    presentation_mode_label: Presentation mode
    shortcut_help_title: Keyboard shortcuts
    shortcut_help_body: Use Left and Right, swipe left or right, Space or Enter for next, and Escape to exit presentation mode.
    shortcut_help_dismiss_label: Do not show again
  home_hero:
    title_primary: Aurora
    title_accent: Notes
    subtitle: Community Updates
  home_intro: Quarterly community updates, published as a static presentation app.
  home_cta_label: View latest presentation
  presentations_cta_label: View all presentations
  home_logos:
    - name: Aurora Notes
      url: https://example.org/projects/aurora-notes/
      logo:
        url: content/assets/aurora-notes-logo.svg
        alt: Aurora Notes logo
    - name: Orbital Labs
      url: https://example.org/projects/orbital-labs/
      logo:
        url: content/assets/orbital-labs-logo.svg
        alt: Orbital Labs logo
  presentations_page:
    title: All presentations
    search_label: Search
    search_placeholder: Search presentations...
    year_label: Year
    all_years_label: All years
    open_presentation_label: Open presentation
    empty_title: No matching presentations
    empty_message: Try a different year or a broader search term.
    previous_page_label: Previous
    next_page_label: Next
    page_label: Page
    page_of_label: of
    showing_label: Showing
    total_label: total
    presentation_singular_label: presentation
    presentation_plural_label: presentations
  links:
    repository:
      label: GitHub Repo
      url: https://github.com/example-org/aurora-notes
      eyebrow: Source Code
    docs:
      label: Aurora Notes Docs
      url: https://docs.example.org/aurora-notes
      eyebrow: Documentation
    community:
      label: Demo Project
      url: https://example.org/projects/aurora-notes/
      eyebrow: Foundation
