# yaml-language-server: $schema=https://slide-spec.dev/schema/presentation.schema.json
schemaVersion: 1
presentation:
  id: 2025-template-sparse
  year: 2025
  title: Aurora Notes Sparse Template Coverage
  subtitle: Sparse Coverage
  slides:
    - template: hero
      enabled: true
      content:
        title_accent: Aurora Notes
    - template: agenda
      enabled: true
      title: Agenda
    - template: section-list-grid
      enabled: true
      title: Minimal Updates
      content:
        sections: []
    - template: timeline
      enabled: true
      title: Releases
      content:
        featured_release_ids: []
    - template: progress-timeline
      enabled: true
      title: Roadmap
      content:
        stage: completed
        stages:
          completed:
            label: Completed
            summary: Done
          in-progress:
            label: In Progress
            summary: Doing
          planned:
            label: Planned
            summary: Soon
          future:
            label: Future
            summary: Later
        items:
          - One
        themes:
          - category: Theme
            target: Target
    - template: people
      enabled: true
      title: Contributors
      content:
        spotlight: []
    - template: metrics-and-links
      enabled: true
      title: Community Highlights
      content:
        stat_keys: []
        mentions: []
    - template: action-cards
      enabled: true
      title: How to Contribute
      content:
        cards: []
    - template: closing
      enabled: true
      content:
        heading: Thanks
        message: See you soon.
