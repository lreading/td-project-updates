    - kind: how-to-contribute
      enabled: true
      subtitle: Join the mission to make threat modeling less threatening
      cards:
        - title: Report Bugs
          description: Found an issue? Let us know! Please include reproduction steps, environment details, and screenshots if possible.
          url_label: Submit an issue
          url: https://github.com/OWASP/threat-dragon/issues
        - title: Submit Code
          description: Pick up an issue labelled "good first issue". Fork the repository, branch off main, and submit your Pull Request.
          url_label: Read CONTRIBUTING.md
          url: https://github.com/OWASP/threat-dragon/blob/main/CONTRIBUTING.md
        - title: Improve Docs
          description: Help us make Threat Dragon easier to use. Fix typos, add user guides, or improve the API documentation.
          url_label: Edit docs on GitHub
          url: https://github.com/OWASP/threat-dragon
        - title: Spread the Word
          description: Share your threat models, write blog posts, give talks, or simply star the repository to help us grow.
          url_label: Share & Star
          url: https://github.com/OWASP/threat-dragon
    - kind: thank-you
      enabled: true
      heading: Thank you
      message: See you next quarter.
