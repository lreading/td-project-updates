presentation:
  id: 2026-q1
  year: 2026
  quarter: 1
  title: OWASP Threat Dragon Quarterly Community Update
  subtitle: Q1 2026
  roadmap:
    agenda_label: Roadmap
    deliverables_heading: Key deliverables
    focus_areas_heading: Focus areas
    footer_link_label: View full roadmap & milestones on GitHub
    sections:
      completed:
        label: Completed
        summary: Foundational work shipped this quarter and is already improving daily use.
        items:
          - Released v2.3 with the refreshed desktop shell and updated packaging pipeline.
          - Shipped dark mode polish across the editor, report views, and supporting dialogs.
          - Simplified first-run setup so new users can open sample models faster.
          - Closed long-running rendering bugs affecting larger diagrams and export stability.
        themes:
          - category: UX & Documentation
            target: Reworked onboarding flows and clarified setup guidance for new contributors.
          - category: Release Engineering
            target: Tightened packaging, smoke testing, and release validation across supported builds.
          - category: Product Quality
            target: Reduced editor regressions and improved confidence in quarter-end release trains.
      in-progress:
        label: In Progress
        summary: Active workstreams are focused on collaboration and better project interoperability.
        items:
          - Building cloud-backed project sync experiments for teams that work across devices.
          - Iterating on reusable diagram templates for common architecture and threat-model patterns.
          - Improving import/export fidelity so richer models survive handoff between environments.
          - Tightening contributor workflows around issue triage, reviews, and milestone tracking.
        themes:
          - category: Collaboration
            target: Make it easier for distributed teams to share, review, and refine threat models.
          - category: Templates
            target: Provide opinionated starting points for common deployment patterns and domains.
          - category: Workflow
            target: Reduce maintenance overhead by standardizing contributor and reviewer flows.
      planned:
        label: Planned
        summary: The next planned wave is centered on integrations and smoother team-scale adoption.
        items:
          - Add collaborative editing milestones after the current sync foundation stabilizes.
          - Expand CI and Git hosting integrations to reduce manual project synchronization.
          - Improve reporting outputs so presentations and status updates are easier to prepare.
          - Formalize roadmap review checkpoints to keep community priorities visible each quarter.
        themes:
          - category: Team Adoption
            target: Lower friction for teams using Threat Dragon as part of regular delivery workflows.
          - category: Integrations
            target: Connect repository events, reviews, and generated outputs more cleanly.
          - category: Reporting
            target: Turn project activity into presentation-ready summaries with less manual effort.
      future:
        label: Future
        summary: Longer-horizon exploration remains focused on extending reach without adding runtime complexity.
        items:
          - Explore companion experiences that make threat-model review easier on smaller devices.
          - Evaluate advanced assistant-like workflows without making the core product depend on AI.
          - Investigate richer analysis helpers for large model libraries and repeated review cycles.
          - Map out future maintainer tooling needed to support a broader contributor base.
        themes:
          - category: Platform Reach
            target: Extend the product to more environments while keeping the core workflow familiar.
          - category: Analysis
            target: Surface more guidance for large projects without compromising explainability.
          - category: Sustainability
            target: Grow maintainer leverage so roadmap execution remains steady quarter over quarter.
  slides:
    - template: hero
      enabled: true
      content:
        title_primary: OWASP
        title_accent: Threat Dragon
        subtitle_prefix: Quarterly Community Update
        quote: making threat modeling less threatening
    - template: agenda
      enabled: true
      title: Agenda
      subtitle: Overview of today's update
      content: {}
    - template: section-list-grid
      enabled: true
      title: What Happened Since Last Update
      subtitle: Summary of key activities and progress
      content:
        sections:
        - title: Fixes and improvements
          bullets:
            - Performance optimization for large threat models
            - Resolved rendering issues in diagram editor
            - Updated electron dependencies to latest stable version
            - Enhanced PDF report generation speed
            - Fixed keyboard shortcut conflicts on MacOS
        - title: New features
          bullets:
            - Dark mode support for desktop application
            - Custom threat rule templates integration
            - Enhanced GitHub authentication flow
            - New diagram shapes for cloud infrastructure
            - Auto-save functionality for local files
        - title: Community activity
          bullets:
            - 15 new contributors welcomed this quarter
            - Hosted 2 community workshops on Discord
            - Launched new documentation portal theme
            - Translated UI into 3 new languages
            - Over 500 new stars on GitHub repository
    - template: timeline
      enabled: true
      title: Releases
      subtitle: Recent version history and changelog
      content:
        latest_badge_label: Latest
        footer_link_label: View all releases on GitHub
        featured_release_ids:
          - v2.3.0
          - v2.2.1
          - v2.2.0
    - template: progress-timeline
      enabled: true
      title: "Roadmap: Completed"
      content:
        stage: completed
    - template: progress-timeline
      enabled: true
      title: "Roadmap: In Progress"
      content:
        stage: in-progress
    - template: progress-timeline
      enabled: true
      title: "Roadmap: Planned"
      content:
        stage: planned
    - template: progress-timeline
      enabled: true
      title: "Roadmap: Future"
      content:
        stage: future
    - template: people
      enabled: true
      title: Contributor Spotlight
      subtitle: Recognizing our top community contributors this quarter
      content:
        banner_prefix: Special thanks to all
        contributors_link_label: contributors
        banner_suffix: who submitted PRs, reported bugs, and improved docs this quarter!
        spotlight:
          - login: schen_dev
            summary: Led the complete overhaul of the dark mode color system and fixed 12 accessibility issues in the diagram editor, making Threat Dragon usable for everyone.
          - login: mjohnson_sec
            summary: Implemented the new custom rule template engine that allows organizations to define their own threat libraries and compliance checks.
          - login: erodriguez_docs
            summary: Rewrote the entire Getting Started guide series and added comprehensive examples for cloud-native threat modeling scenarios.
    - template: metrics-and-links
      enabled: true
      title: Community Highlights
      subtitle: Notable community activity and ecosystem updates from Q1 2026
      content:
        section_heading: Community Activity
        stats_heading: Stats This Quarter
        trend_suffix: vs last quarter
        stat_keys:
          - stars
          - issues_closed
          - prs_merged
          - new_contributors
        mentions:
          - type: Conference talk
            title: '"Scaling Threat Modeling with OWASP Threat Dragon" at AppSec Global 2025'
            url_label: Watch recording on YouTube
            url: https://www.youtube.com/
          - type: Interop tool
            title: 'Community-maintained export bridge for pulling Threat Dragon models into architecture review workflows'
            url_label: Explore the prototype on GitHub
            url: https://github.com/OWASP/threat-dragon
          - type: Blog post
            title: 'Open source threat modeling round-up featuring Threat Dragon in a broader secure design toolkit'
            url_label: Read the write-up
            url: https://owasp.org/
    - template: action-cards
      enabled: true
      title: How to Contribute
      subtitle: Join the mission to make threat modeling less threatening
      content:
        footer_text: Open Source and Community Driven
        cards:
          - title: Report Bugs
            description: Found an issue? Let us know! Please include reproduction steps, environment details, and screenshots if possible.
            url_label: Submit an issue
            url: https://github.com/OWASP/threat-dragon/issues
          - title: Submit Code
            description: Pick up an issue labelled "good first issue". Fork the repository, branch off main, and submit your Pull Request.
            url_label: Read CONTRIBUTING.md
            url: https://github.com/OWASP/threat-dragon/blob/main/CONTRIBUTING.md
          - title: Improve Docs
            description: Help us make Threat Dragon easier to use. Fix typos, add user guides, or improve the API documentation.
            url_label: Edit docs on GitHub
            url: https://github.com/OWASP/threat-dragon
          - title: Spread the Word
            description: Share your threat models, write blog posts, give talks, or simply star the repository to help us grow.
            url_label: Share & Star
            url: https://github.com/OWASP/threat-dragon
    - template: closing
      enabled: true
      content:
        heading: Thank you
        message: See you next quarter.
        quote: making threat modeling less threatening
