# yaml-language-server: $schema=https://slide-spec.dev/schema/presentation.schema.json
schemaVersion: 1
presentation:
  id: 2026-q1
  title: Aurora Notes Community Update
  subtitle: Q1 2026
  slides:
    - template: hero
      enabled: true
      content:
        title_primary: Aurora
        title_accent: Notes
        subtitle_prefix: Community Update
        quote: making project updates easier to share
    - template: agenda
      enabled: true
      title: Agenda
    - template: section-list-grid
      enabled: true
      title: What Happened Since Last Update
      subtitle: Product, documentation, and contributor progress from January through March
      content:
        sections:
          - title: Authoring, templates, and publishing
            bullets:
              - Reusable briefing templates landed for roadmap, release, and community updates.
              - The content manifest gained clearer metadata for publication windows and owners.
              - Starter examples now cover weekly notes, planning reviews, and decision logs.
              - Preview routing was tightened for nested presentation paths.
              - The presentation picker now handles larger local archives with predictable ordering.
          - title: Quality, docs, and delivery
            bullets:
              - Template documentation examples were refreshed to match current rendering behavior.
              - Content validation messages now point authors to the field that needs attention.
              - Dependency cleanup and build script refactoring reduced maintenance overhead.
              - CI workflow actions were updated to current versions.
              - Contribution guidance now asks for local preview notes before submission.
          - title: Community and usability
            bullets:
              - Keyboard shortcuts were clarified in the presenter help panel.
              - Empty-state copy was improved for first-run local content.
              - Unit-test coverage and end-to-end coverage both increased in March.
              - Spanish localization strings were updated by a first-time contributor.
              - The period added 5 first-time contributors and 24 merged pull requests.
    - template: timeline
      enabled: true
      title: Releases
      subtitle: No tagged GitHub releases landed during this reporting period
      content:
        latest_badge_label: Latest
        footer_link_label: View release history on GitHub
        empty_state_title: No tagged releases in this period
        empty_state_message: Q1 work focused on reusable templates, authoring quality, documentation, and release engineering
          improvements rather than a packaged release.
        featured_release_ids: []
    - template: progress-timeline
      enabled: true
      title: "Roadmap: Completed"
      content:
        stage: completed
        deliverables_heading: Key deliverables
        focus_areas_heading: Focus areas
        footer_link_label: View full roadmap & milestones on GitHub
        stages:
          completed:
            label: Completed
            summary: Templates, content metadata, and publishing improvements landed in the product during this period.
          in-progress:
            label: In Progress
            summary: March delivery and the new public roadmap show active investment in maintainability, testing, documentation,
              and release readiness.
          planned:
            label: Planned
            summary: The published roadmap shifts next-step planning toward enterprise readiness, better UX, and automation-friendly
              workflows.
          future:
            label: Future
            summary: Version 3.x remains centered on a more interoperable file format and long-horizon project maturity goals.
        items:
          - Reusable briefing templates landed for roadmap, release, and community updates.
          - Aurora Notes' content manifest gained clearer publication metadata.
          - Starter examples now cover weekly notes, planning reviews, and decision logs.
          - Preview and archive fixes landed for nested routes, ordering, and template visibility.
        themes:
          - category: Team Readiness
            target: Templates and preview fixes continue to make Aurora Notes easier for teams to adopt.
          - category: Publishing Flow
            target: Archive ordering and nested routes improved compatibility with static hosting workflows.
          - category: Authoring Quality
            target: Validation and empty-state updates reduced friction in day-to-day editing.
    - template: progress-timeline
      enabled: true
      title: "Roadmap: In Progress"
      content:
        stage: in-progress
        deliverables_heading: Key deliverables
        focus_areas_heading: Focus areas
        footer_link_label: View full roadmap & milestones on GitHub
        stages:
          completed:
            label: Completed
            summary: Templates, content metadata, and publishing improvements landed in the product during this period.
          in-progress:
            label: In Progress
            summary: March delivery and the new public roadmap show active investment in maintainability, testing, documentation,
              and release readiness.
          planned:
            label: Planned
            summary: The published roadmap shifts next-step planning toward enterprise readiness, better UX, and automation-friendly
              workflows.
          future:
            label: Future
            summary: Version 3.x remains centered on a more interoperable file format and long-horizon project maturity goals.
        items:
          - Presentation search coverage and keyboard navigation coverage both landed in March.
          - Documentation cleanup continued with dependency updates, template example fixes, and contributor guidance changes.
          - Workflow and dependency maintenance continued across CI actions and build assets.
          - The public planning board opened on March 8 to align future work under shared themes.
        themes:
          - category: Maintainability
            target: Testing coverage, dependency hygiene, and build cleanup remain active themes.
          - category: Community Confidence
            target: Contributor guidance and documentation are being tightened as the project grows.
          - category: Release Notes
            target: Release-readiness work continued even without a tagged GitHub release in the window.
    - template: progress-timeline
      enabled: true
      title: "Roadmap: Planned"
      content:
        stage: planned
        deliverables_heading: Key deliverables
        focus_areas_heading: Focus areas
        footer_link_label: View full roadmap & milestones on GitHub
        stages:
          completed:
            label: Completed
            summary: Templates, content metadata, and publishing improvements landed in the product during this period.
          in-progress:
            label: In Progress
            summary: March delivery and the new public roadmap show active investment in maintainability, testing, documentation,
              and release readiness.
          planned:
            label: Planned
            summary: The published roadmap shifts next-step planning toward enterprise readiness, better UX, and automation-friendly
              workflows.
          future:
            label: Future
            summary: Version 3.x remains centered on a more interoperable file format and long-horizon project maturity goals.
        items:
          - Workspace presets, review checklists, and project templates remain part of the team-readiness backlog.
          - Content catalogs, authoring guides, and CLI preview polish are called out as future deliverables.
          - UX work includes search ergonomics, WCAG accessibility baselines, and a UI style guide.
          - Export options, preview hooks, and publishing workflows are listed under automation.
        themes:
          - category: Team Readiness
            target: Support team adoption without abandoning Git-based workflows.
          - category: UX & Accessibility
            target: Improve approachability, consistency, and accessibility across the product.
          - category: Automation & Integration
            target: Make Aurora Notes easier to connect to publishing workflows and tooling.
    - template: progress-timeline
      enabled: true
      title: "Roadmap: Future"
      content:
        stage: future
        deliverables_heading: Key deliverables
        focus_areas_heading: Focus areas
        footer_link_label: View full roadmap & milestones on GitHub
        stages:
          completed:
            label: Completed
            summary: Templates, content metadata, and publishing improvements landed in the product during this period.
          in-progress:
            label: In Progress
            summary: March delivery and the new public roadmap show active investment in maintainability, testing, documentation,
              and release readiness.
          planned:
            label: Planned
            summary: The published roadmap shifts next-step planning toward enterprise readiness, better UX, and automation-friendly
              workflows.
          future:
            label: Future
            summary: Version 3.x remains centered on a more interoperable file format and long-horizon project maturity goals.
        items:
          - Version 3.x is expected to move toward reusable content packages instead of one-off decks.
          - Portable metadata is the likely direction for the future project manifest.
          - The project page explicitly calls out integrations with adjacent publishing tools.
          - The long-horizon roadmap also aims for a stable template marketplace.
        themes:
          - category: Portable Metadata
            target: Center authored updates around reusable project data and interchange.
          - category: Publishing Ecosystem
            target: Reduce friction between Aurora Notes and other open-source publishing tools.
          - category: Project Maturity
            target: Continue the path from Demo Lab toward stable-template maturity.
    - template: people
      enabled: true
      title: Contributor Spotlight
      subtitle: Real contributions that materially moved Aurora Notes forward in this reporting period
      content:
        banner_prefix: Special thanks to all
        contributors_link_label: contributors
        banner_suffix: who shipped code, docs, tests, translations, and roadmap work during Q1 2026.
        spotlight:
          - login: river-park
            summary: Delivered reusable briefing templates for roadmap and release updates, then followed through with preview
              routing and documentation fixes.
          - login: mint-owl
            summary: Tightened authoring reliability by improving validation messages and expanding keyboard navigation coverage.
          - login: sunny-batch
            summary: Expanded the sample library with planning review examples, extending the project's publishing story.
    - template: metrics-and-links
      enabled: true
      title: Community Highlights
      subtitle: Project, documentation, and roadmap signals from the first months of 2026
      content:
        section_heading: Community Activity
        stats_heading: Stats This Quarter
        trend_suffix: vs previous period
        stat_keys:
          - stars
          - issues_closed
          - prs_merged
          - new_contributors
        mentions:
          - type: Public roadmap
            title: Aurora Notes' public planning board opened in March 2026 with themes for maintainability, team readiness,
              UX/accessibility, publishing workflows, and community confidence.
            url_label: Join the GitHub discussion
            url: https://github.com/example-org/aurora-notes/discussions/42
          - type: Project initiative
            title: The project page now highlights reusable briefing templates and publishing examples as named community
              initiatives.
            url_label: View the project page
            url: https://example.org/projects/aurora-notes/
          - type: Documentation
            title: The version 2 documentation continues to cover configuration, templates, testing, and content metadata for current
              users and contributors.
            url_label: Browse the docs
            url: https://docs.example.org/aurora-notes
    - template: action-cards
      enabled: true
      title: How to Contribute
      subtitle: Practical ways to contribute code, docs, testing, and feedback
      content:
        footer_text: Open Source and Community Driven
        cards:
          - title: Report Bugs
            description: File a reproducible issue with environment details, screenshots, and any project or stack context that helps
              maintainers confirm the problem.
            url_label: Submit an issue
            url: https://github.com/example-org/aurora-notes/issues
          - title: Submit Code
            description: Pick up a tracked issue, fork the repository, and submit a pull request that includes the manual testing
              now required in the contribution guide.
            url_label: Read CONTRIBUTING.md
            url: https://github.com/example-org/aurora-notes/blob/main/CONTRIBUTING.md
          - title: Improve Docs
            description: Improve installation docs, schema guidance, deployment notes, or contributor documentation so users can
              adopt Aurora Notes more easily.
            url_label: Edit docs on GitHub
            url: https://github.com/example-org/aurora-notes
          - title: Spread the Word
            description: Join the roadmap discussion, share your usage patterns, star the repository, or help connect Aurora Notes
              to adjacent open-source workflows.
            url_label: Share & Star
            url: https://github.com/example-org/aurora-notes
    - template: closing
      enabled: true
      content:
        heading: Thank you
        message: See you in the next update.
        quote: making project updates easier to share
