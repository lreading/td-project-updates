presentation:
  id: 2026-q1-update
  year: 2026
  title: "Vortex CLI: Q1 2026"
  subtitle: Community Update
  slides:
    - template: hero
      enabled: true
      content:
        title_primary: Vortex
        title_accent: CLI
        subtitle_prefix: Q1 2026
        quote: Build tools should be invisible. When they work well, you forget they are there.
    - template: agenda
      enabled: true
      title: Agenda
      subtitle: What this update covers
    - template: section-list-grid
      enabled: true
      title: What shipped
      subtitle: Highlights from the past quarter
      content:
        sections:
          - title: Plugin system
            bullets:
              - Local plugins resolve from the project directory
              - Registry plugins install from the public catalog
              - Lifecycle hooks for init, build, and deploy phases
          - title: Error messages
            bullets:
              - Structured output with error codes and fix suggestions
              - Links to relevant documentation in every error
              - Machine-readable JSON output for CI pipelines
          - title: Shell completions
            bullets:
              - Auto-generated completions for bash, zsh, and fish
              - Dynamic completions for project-specific commands
              - Installable via a single CLI command
    - template: timeline
      enabled: true
      title: Releases
      subtitle: Tagged versions from Q1
      content:
        latest_badge_label: Latest
        footer_link_label: All releases on GitHub
        featured_release_ids:
          - v3-2-0
          - v3-1-0
    - template: progress-timeline
      enabled: true
      title: "Roadmap: Completed"
      subtitle: What we shipped
      content:
        stage: completed
        deliverables_heading: Shipped
        focus_areas_heading: Themes
        footer_link_label: View full roadmap
        stages:
          completed:
            label: Completed
            summary: Shipped in Q1 2026.
          in-progress:
            label: In Progress
            summary: Active work continuing into Q2.
          planned:
            label: Planned
            summary: Scoped for Q2 2026.
          future:
            label: Future
            summary: Under discussion.
        items:
          - Plugin system with local and registry-based resolution
          - Structured error messages with fix suggestions
          - Shell completion for bash, zsh, and fish
        themes:
          - category: Extensibility
            target: Let users add functionality without forking.
          - category: Developer Experience
            target: Reduce time-to-fix for common errors.
    - template: people
      enabled: true
      title: Contributor spotlight
      subtitle: People who made Q1 happen
      content:
        banner_prefix: Thanks to all
        contributors_link_label: contributors
        banner_suffix: who helped shape this release.
        spotlight:
          - login: sarah-plugins
            summary: Designed and implemented the plugin resolution system from scratch.
          - login: kai-errors
            summary: Rewrote the error pipeline to include structured codes and fix suggestions.
          - login: mina-shells
            summary: Added shell completion generators for all three supported shells.
    - template: metrics-and-links
      enabled: true
      title: Community health
      subtitle: Growth signals from Q1
      content:
        section_heading: In the wild
        stats_heading: This quarter
        trend_suffix: vs last quarter
        show_deltas: true
        stat_keys:
          - stars
          - issues_closed
          - prs_merged
          - new_contributors
        mentions:
          - type: Blog post
            title: How we built the Vortex plugin system
            url_label: Read on the blog
            url: https://vortex-cli.example.com/blog/plugin-system
          - type: Conference talk
            title: "DevTools Conf: Building extensible CLIs"
            url_label: Watch the recording
            url: https://example.com/talks/extensible-clis
    - template: action-cards
      enabled: true
      title: Get involved
      subtitle: Ways to contribute this quarter
      content:
        footer_text: Every contribution matters, no matter the size.
        cards:
          - title: Write a plugin
            description: Build a plugin and publish it to the registry. The plugin guide has templates to get started.
            url_label: Plugin guide
            url: https://vortex-cli.example.com/docs/plugins
          - title: Improve docs
            description: Help us write better guides, fix typos, or add examples for common workflows.
            url_label: Docs backlog
            url: https://github.com/example/vortex-cli/issues?q=label%3Adocs
          - title: Report bugs
            description: Found something broken? File an issue with reproduction steps and we will prioritize it.
            url_label: Open an issue
            url: https://github.com/example/vortex-cli/issues/new
    - template: closing
      enabled: true
      content:
        heading: Thank you
        message: Vortex CLI is built by its community. Every issue, PR, and plugin makes it better for everyone.
        quote: Ship tools, not tickets.
